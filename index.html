
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRICKCAST</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>

<style>

body{
margin:0;
background:#020617;
font-family:Inter,Arial;
color:white;
}

/* HEADER */

.header{
display:flex;
justify-content:center;
padding:25px 0 10px;
}

.logo-pill{
border:1px solid rgba(255,255,255,.3);
border-radius:40px;
padding:10px 25px;
font-weight:800;
font-size:22px;
letter-spacing:1px;
background:#020617;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

.logo-pill span{
color:#38bdf8;
}

/* PLAYER */

.player-box{
max-width:1000px;
margin:auto;
display:none;
padding:10px;
}

video{
width:100%;
border-radius:14px;
}

/* SECTIONS */

.section{
max-width:1000px;
margin:auto;
padding:10px;
}

.section-title{
font-size:13px;
letter-spacing:1px;
color:#94a3b8;
margin-bottom:12px;
}

/* LIVE HORIZONTAL */

.live-row{
display:flex;
gap:12px;
overflow-x:auto;
padding-bottom:10px;
}

.live-card{
min-width:180px;
background:#0f172a;
border-radius:14px;
overflow:hidden;
cursor:pointer;
border:1px solid rgba(255,255,255,.1);
}

.live-card img{
width:100%;
height:100px;
object-fit:cover;
}

.live-tag{
position:absolute;
background:#ff2d2d;
color:white;
font-size:10px;
padding:3px 8px;
border-radius:20px;
margin:8px;
font-weight:700;
}

/* UPCOMING */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:15px;
}

.match-card{
background:#0f172a;
border-radius:18px;
overflow:hidden;
border:1px solid rgba(56,189,248,.3);
}

.match-card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.tournament{
font-size:11px;
color:#94a3b8;
margin-bottom:5px;
}

.match-title{
font-weight:800;
font-size:16px;
margin-bottom:12px;
}

.watch-btn{
display:block;
text-align:center;
padding:12px;
border-radius:30px;
background:linear-gradient(90deg,#2563eb,#1d4ed8);
color:white;
text-decoration:none;
font-weight:800;
}

/* INSTAGRAM */

.insta{
position:fixed;
right:20px;
bottom:20px;
width:55px;
height:55px;
background:#e1306c;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 5px 20px rgba(0,0,0,.5);
}

.insta img{
width:26px;
}

/* MOBILE */

@media(max-width:700px){

.live-card{
min-width:150px;
}

.match-card img{
height:120px;
}

}

</style>
</head>

<body>

<div class="header">
<div class="logo-pill">⚡ <span>CRICKCAST</span></div>
</div>

<div class="player-box" id="playerBox">
<video id="player" controls playsinline></video>
</div>

<div class="section">

<div class="section-title">LIVE MATCHES</div>

<div class="live-row" id="liveMatches"></div>

</div>

<div class="section">

<div class="section-title">UPCOMING MATCHES</div>

<div class="grid" id="upcomingMatches"></div>

</div>

<a href="https://www.instagram.com/crickcast.live" target="_blank" class="insta">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<script>

const workerUrl="https://sonyli.akcoder777.workers.dev"

const video=document.getElementById("player")

let hls
let player

function playStream(url){

document.getElementById("playerBox").style.display="block"

if(hls) hls.destroy()

if(Hls.isSupported()){

hls=new Hls()

hls.loadSource(url)

hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED,function(){

if(!player) player=new Plyr(video)

video.play()

})

}else{

video.src=url

if(!player) player=new Plyr(video)

}

window.scrollTo({top:0,behavior:"smooth"})

}

async function loadMatches(){

const res=await fetch(workerUrl+"?t="+Date.now())

const data=await res.json()

const liveContainer=document.getElementById("liveMatches")

const upcomingContainer=document.getElementById("upcomingMatches")

liveContainer.innerHTML=""
upcomingContainer.innerHTML=""

data.matches.forEach(m=>{

const stream=m.dai_url

const name=m.match_name || m.event_name

const banner=m.src || ""

if(stream){

const card=document.createElement("div")

card.className="live-card"

card.innerHTML=`

<div style="position:relative">

<img src="${banner}">

<div class="live-tag">LIVE</div>

</div>

`

card.onclick=()=>playStream(stream)

liveContainer.appendChild(card)

}else{

const card=document.createElement("div")

card.className="match-card"

card.innerHTML=`

<img src="${banner}">

<div class="card-body">

<div class="tournament">${m.event_name||""}</div>

<div class="match-title">${name}</div>

<a class="watch-btn">Upcoming</a>

</div>

`

upcomingContainer.appendChild(card)

}

})

}

loadMatches()

setInterval(loadMatches,120000)

</script>

</body>
</html>
```
