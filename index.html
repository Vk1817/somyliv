<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkCoder Premium | Plyr Edition</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>

    <style>
        :root { --bg: #020617; --accent: #38bdf8; --border: rgba(255,255,255,0.1); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 12px 20px; background: #0f172a; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .main { display: flex; flex: 1; overflow: hidden; }
        
        /* Player Styling */
        #video-section { flex: 3; background: #000; display: flex; flex-direction: column; }
        .plyr { height: 100%; width: 100%; }
        
        #language-bar { background: #1e293b; padding: 12px; display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--border); }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: white; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s; }
        .lang-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Sidebar Styling */
        .sidebar { flex: 1; max-width: 380px; background: #0f172a; border-left: 1px solid var(--border); overflow-y: auto; padding: 15px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 12px; cursor: pointer; display: flex; gap: 12px; transition: 0.2s; }
        .card:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }
        .card img { width: 90px; height: 55px; border-radius: 6px; object-fit: cover; background: #334155; }
        .card-info h4 { margin: 0; font-size: 0.85rem; color: #f1f5f9; }
        .card-info p { margin: 3px 0; font-size: 0.7rem; color: #94a3b8; }
        .active-card { border-left: 4px solid var(--accent); background: rgba(56, 189, 248, 0.08); }
        
        .badge { font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: bold; text-transform: uppercase; margin-top: 5px; display: inline-block; }
        .badge-live { background: #ef4444; color: white; }
        .badge-up { background: #475569; color: #cbd5e1; }

        @media (max-width: 850px) { .main { flex-direction: column; } #video-section { height: 40vh; flex: none; } .sidebar { max-width: 100%; border-left: none; } }
    </style>
</head>
<body>

<header>
<div style="display: flex; justify-content: center; align-items: center; width: 100%; margin: 10px 0;">
    <div style="display: flex; align-items: center; gap: 8px; border: 1.5px solid #2a4b8d; padding: 6px 25px; border-radius: 50px; background: rgba(255, 255, 255, 0.05);">
        <span style="color: #ffca28; font-size: 1.2rem;">⚡</span>
        
        <h2 style="margin: 0; font-size: 1.2rem; color: #4fa8ff; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; font-family: sans-serif;">
            CrickCast
        </h2>
    </div>
</div>


</header>

<div class="main">
    <div id="video-section">
        <video id="player" playsinline controls></video>
        <div id="language-bar">
            <span style="font-size: 11px; color: #94a3b8; text-transform: uppercase;">Audio:</span>
            <div id="lang-options" style="display: flex; gap: 8px;"></div>
        </div>
    </div>
    
    <div class="sidebar">
        <h3 style="font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;">Live & Upcoming</h3>
        <div id="match-list"></div>
    </div>
</div>

<script>
    const workerUrl = "https://sonyli.akcoder777.workers.dev";
    const video = document.getElementById('player');
    let plyrInstance = null;
    let hlsInstance = null;

    // Initialize/Update Player with HLS and Quality Options
    function initPlayer(url) {
        if (hlsInstance) hlsInstance.destroy();
        
        if (Hls.isSupported()) {
            hlsInstance = new Hls();
            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(video);

            hlsInstance.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                // Extract available qualities
                const availableQualities = hlsInstance.levels.map((l) => l.height);
                availableQualities.unshift(0); // Add 'Auto'

                // Initialize or Update Plyr
                if (!plyrInstance) {
                    plyrInstance = new Plyr(video, {
                        quality: {
                            default: 0,
                            options: availableQualities,
                            forced: true,
                            onChange: (e) => updateQuality(e),
                        },
                        i18n: { quality: 'Quality', auto: 'Auto' }
                    });
                } else {
                    // Update quality options for the new stream
                    plyrInstance.quality.options = availableQualities;
                }
            });

            // Handle Quality Change
            function updateQuality(newQuality) {
                if (newQuality === 0) {
                    hlsInstance.currentLevel = -1; // Auto
                } else {
                    hlsInstance.levels.forEach((level, levelIndex) => {
                        if (level.height === newQuality) {
                            hlsInstance.currentLevel = levelIndex;
                        }
                    });
                }
            }
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari Fallback
            video.src = url;
            if (!plyrInstance) plyrInstance = new Plyr(video);
        }
    }

    // Extraction and Grouping Logic
    function extractLang(fullName) {
        const match = fullName.match(/\[([A-Z]{2,3})\]/);
        return match ? match[1] : "LIVE";
    }

    async function loadData() {
        try {
            const res = await fetch(workerUrl + "?t=" + Date.now());
            const data = await res.json();
            const groups = {};

            data.matches.forEach(m => {
                let rawName = m.match_name || m.event_name || "Unknown Event";
                if (rawName === "undefined") rawName = "Upcoming Match";

                const baseName = rawName.split(' [')[0];
                const language = extractLang(rawName);

                if (!groups[baseName]) {
                    groups[baseName] = { name: baseName, event: m.event_name, thumb: m.src, isLive: false, streams: [] };
                }
                if (m.dai_url && m.dai_url.startsWith('http')) {
                    groups[baseName].streams.push({ lang: language, url: m.dai_url });
                    groups[baseName].isLive = true;
                }
            });

            const listDiv = document.getElementById('match-list');
            listDiv.innerHTML = "";

            Object.values(groups).forEach((group, idx) => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <img src="${group.thumb}" onerror="this.src='https://placehold.co/90x55/1e293b/white?text=LIVE'">
                    <div class="card-info">
                        <h4>${group.name}</h4>
                        <p>${group.event || 'Sports'}</p>
                        <span class="badge ${group.isLive ? 'badge-live' : 'badge-up'}">${group.isLive ? 'Live' : 'Upcoming'}</span>
                    </div>
                `;

                card.onclick = () => {
                    document.querySelectorAll('.card').forEach(c => c.classList.remove('active-card'));
                    card.classList.add('active-card');
                    setupLangs(group.streams);
                };
                listDiv.appendChild(card);
                if (idx === 0) card.click();
            });
        } catch (e) { console.error(e); }
    }

    function setupLangs(streams) {
        const bar = document.getElementById('lang-options');
        bar.innerHTML = "";
        if (!streams.length) {
            bar.innerHTML = "<span style='font-size:12px; color:#64748b;'>No stream URL available yet.</span>";
            return;
        }
        streams.forEach((s, i) => {
            const btn = document.createElement('button');
            btn.className = "lang-btn";
            btn.innerText = s.lang;
            btn.onclick = () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                initPlayer(s.url);
            };
            bar.appendChild(btn);
            if (i === 0) btn.click();
        });
    }

    window.onload = loadData;
</script>
</body>
</html>
