<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricKCast Live</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>
<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>

<style>

:root{
--bg:#020617;
--card:#0f172a;
--accent:#38bdf8;
--border:rgba(255,255,255,0.1);
}

body{
margin:0;
background:linear-gradient(135deg,#020617,#020617,#0f172a);
color:white;
font-family:Inter,Arial;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

/* HEADER */

header{
padding:12px 20px;
background:#0f172a;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
}

.brand{
font-weight:900;
font-size:18px;
color:var(--accent);
}

.header-buttons{
display:flex;
gap:10px;
}

.btn{
padding:6px 14px;
font-size:12px;
border-radius:6px;
font-weight:600;
cursor:pointer;
border:1px solid var(--border);
background:#1e293b;
color:white;
transition:.3s;
}

.btn:hover{
background:var(--accent);
color:black;
}

/* MAIN LAYOUT */

.main{
display:flex;
flex:1;
overflow:hidden;
}

/* PLAYER */

#video-section{
flex:3;
background:#000;
display:flex;
flex-direction:column;
}

.plyr{
height:100%;
width:100%;
}

#language-bar{
background:#0f172a;
padding:10px;
display:flex;
gap:10px;
align-items:center;
border-top:1px solid var(--border);
}

.lang-btn{
background:#1e293b;
border:1px solid var(--border);
color:white;
padding:6px 14px;
border-radius:6px;
cursor:pointer;
font-size:12px;
font-weight:600;
transition:.3s;
}

.lang-btn.active{
background:var(--accent);
color:black;
border-color:var(--accent);
}

/* SIDEBAR */

.sidebar{
flex:1;
max-width:380px;
background:#020617;
border-left:1px solid var(--border);
overflow-y:auto;
padding:15px;
}

.card{
background:#0f172a;
border:1px solid var(--border);
border-radius:10px;
padding:10px;
margin-bottom:12px;
cursor:pointer;
display:flex;
gap:12px;
transition:.25s;
}

.card:hover{
transform:translateY(-3px);
border-color:var(--accent);
box-shadow:0 4px 20px rgba(56,189,248,.2);
}

.card img{
width:90px;
height:55px;
border-radius:6px;
object-fit:cover;
background:#334155;
}

.card-info h4{
margin:0;
font-size:13px;
}

.card-info p{
margin:3px 0;
font-size:11px;
color:#94a3b8;
}

.active-card{
border-left:4px solid var(--accent);
background:#0f172a;
}

/* BADGES */

.badge{
font-size:9px;
padding:2px 6px;
border-radius:3px;
font-weight:bold;
text-transform:uppercase;
margin-top:5px;
display:inline-block;
}

.badge-live{
background:#ef4444;
}

.badge-up{
background:#475569;
}

/* TELEGRAM POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
visibility:hidden;
opacity:0;
transition:.3s;
z-index:9998;
}

.popup.show{
visibility:visible;
opacity:1;
}

.popup-box{
background:#0f172a;
border-radius:14px;
padding:30px;
text-align:center;
border:1px solid var(--border);
max-width:320px;
}

.popup-box h3{
margin-top:0;
color:var(--accent);
}

.popup-box a{
display:inline-block;
margin-top:10px;
background:var(--accent);
color:black;
padding:8px 16px;
border-radius:6px;
font-weight:700;
text-decoration:none;
}

.popup-close{
margin-top:10px;
font-size:12px;
cursor:pointer;
color:#94a3b8;
}

/* FLOATING INSTAGRAM BUTTON */

.insta-float{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:#e1306c;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 6px 20px rgba(0,0,0,.4);
z-index:9999;
transition:.3s;
}

.insta-float:hover{
transform:scale(1.1);
}

.insta-float img{
width:26px;
height:26px;
}

/* RESPONSIVE */

@media(max-width:850px){
.main{flex-direction:column}
#video-section{height:40vh}
.sidebar{max-width:100%;border-left:none}
}

</style>
</head>

<body>

<header>
<div class="brand">CricKCast</div>
<div class="header-buttons">
<button class="btn" onclick="showPopup()">Telegram</button>
</div>
</header>

<div class="main">

<div id="video-section">
<video id="player" playsinline controls></video>

<div id="language-bar">
<span style="font-size:11px;color:#94a3b8;text-transform:uppercase;">Audio:</span>
<div id="lang-options"></div>
</div>
</div>

<div class="sidebar">
<h3 style="font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:1px;">
Live & Upcoming
</h3>
<div id="match-list"></div>
</div>

</div>

<!-- TELEGRAM POPUP -->

<div id="telegramPopup" class="popup">
<div class="popup-box">
<h3>Join Our Telegram</h3>
<p style="font-size:13px;color:#94a3b8">
Get instant live links & updates
</p>
<a href="https://t.me/+BMRZLxqFMctjMjU1" target="_blank">
Join Channel
</a>
<div class="popup-close" onclick="hidePopup()">Maybe Later</div>
</div>
</div>

<!-- FLOATING INSTAGRAM BUTTON -->

<a href="https://www.instagram.com/crickcast.live?igsh=MTZ3ZmtqdDZwdHYzbA==" target="_blank" class="insta-float">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<script>

const workerUrl="https://sonyli.akcoder777.workers.dev";
const video=document.getElementById("player");

let plyrInstance=null;
let hlsInstance=null;

function initPlayer(url){

if(hlsInstance)hlsInstance.destroy();

if(Hls.isSupported()){

hlsInstance=new Hls();

hlsInstance.loadSource(url);

hlsInstance.attachMedia(video);

hlsInstance.on(Hls.Events.MANIFEST_PARSED,function(){

if(!plyrInstance){

plyrInstance=new Plyr(video);

}

});

}

else if(video.canPlayType('application/vnd.apple.mpegurl')){

video.src=url;

if(!plyrInstance)plyrInstance=new Plyr(video);

}

}

function setupLangs(streams){

const bar=document.getElementById('lang-options');

bar.innerHTML="";

streams.forEach((s,i)=>{

const btn=document.createElement('button');

btn.className="lang-btn";

btn.innerText=s.lang;

btn.onclick=()=>{

document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

initPlayer(s.url);

};

bar.appendChild(btn);

if(i===0)btn.click();

});

}

async function loadData(){

const res=await fetch(workerUrl+"?t="+Date.now());

const data=await res.json();

const groups={};

data.matches.forEach(m=>{

let base=(m.match_name||m.event_name||"Match").split(' [')[0];

let lang=(m.match_name.match(/\[([A-Z]{2,3})\]/)||[])[1]||"LIVE";

if(!groups[base]){

groups[base]={name:base,event:m.event_name,thumb:m.src,isLive:false,streams:[]};

}

if(m.dai_url){

groups[base].streams.push({lang:lang,url:m.dai_url});

groups[base].isLive=true;

}

});

const list=document.getElementById("match-list");

list.innerHTML="";

Object.values(groups).forEach((g,i)=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${g.thumb}" onerror="this.src='https://placehold.co/90x55/1e293b/white?text=LIVE'">

<div class="card-info">

<h4>${g.name}</h4>

<p>${g.event||'Sports'}</p>

<span class="badge ${g.isLive?'badge-live':'badge-up'}">${g.isLive?'Live':'Upcoming'}</span>

</div>

`;

card.onclick=()=>{

document.querySelectorAll('.card').forEach(c=>c.classList.remove('active-card'));

card.classList.add('active-card');

setupLangs(g.streams);

};

list.appendChild(card);

if(i===0)card.click();

});

}

function showPopup(){

document.getElementById("telegramPopup").classList.add("show");

}

function hidePopup(){

document.getElementById("telegramPopup").classList.remove("show");

}

setTimeout(showPopup,6000);

window.onload=loadData;

</script>

</body>
</html>
